<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#b9a8e6" />
<title>AURA — Mirage Nights</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none;}
  html,body{height:100%;background:#0a0820;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:#fff;}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;}
  .hud{position:absolute;inset:0;pointer-events:none;z-index:5;}
  #score{position:absolute;top:max(14px,env(safe-area-inset-top));left:0;right:0;text-align:center;font-weight:900;
    font-size:clamp(34px,11vw,58px);letter-spacing:1px;font-variant-numeric:tabular-nums;line-height:1;
    color:#fff;text-shadow:0 2px 0 rgba(120,80,180,.6),0 4px 22px rgba(120,160,255,.6);}
  #combo{position:absolute;top:calc(max(14px,env(safe-area-inset-top)) + clamp(40px,13vw,66px));left:0;right:0;text-align:center;
    font-weight:800;font-size:16px;letter-spacing:3px;opacity:0;transition:opacity .2s;text-shadow:0 2px 8px rgba(0,0,0,.4);}
  #best{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;font-size:11px;letter-spacing:1px;opacity:.7;font-variant-numeric:tabular-nums;text-shadow:0 1px 4px rgba(0,0,0,.5);}
  #pulseWrap{position:absolute;left:50%;bottom:max(26px,calc(env(safe-area-inset-bottom) + 18px));transform:translateX(-50%);width:min(260px,62%);}
  #pulseBar{height:8px;border-radius:6px;background:rgba(255,255,255,.22);overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.3) inset;}
  #pulseFill{height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,#ffd27a,#ff8cc8,#9b8cff);transition:width .08s;}
  #pulseLbl{text-align:center;font-size:10px;letter-spacing:3px;opacity:.7;margin-top:6px;text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,.4);}
  #pulseBtn{position:absolute;right:max(20px,env(safe-area-inset-right));bottom:max(80px,calc(env(safe-area-inset-bottom) + 70px));
    pointer-events:auto;width:86px;height:86px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;letter-spacing:1px;
    border:2px solid rgba(255,210,122,.6);background:rgba(40,28,70,.42);backdrop-filter:blur(8px);box-shadow:0 6px 18px rgba(0,0,0,.3);transition:transform .07s,box-shadow .2s,opacity .2s;opacity:.5;color:#ffe9c0;}
  #pulseBtn.ready{opacity:1;box-shadow:0 0 34px rgba(255,210,122,.7);border-color:#ffd27a;}
  #pulseBtn:active{transform:scale(.9);}
  .panel{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;}
  #title{background:radial-gradient(120% 80% at 50% 30%,rgba(20,16,50,.15),rgba(10,8,32,.55));}
  #title h1{font-size:clamp(64px,26vw,150px);font-weight:900;letter-spacing:6px;line-height:.9;
    background:linear-gradient(180deg,#fff 8%,#ffe39a 42%,#ff9ad0 78%,#9b8cff);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 70px rgba(255,180,220,.4);}
  #title .sub{margin-top:6px;font-size:clamp(12px,4vw,16px);letter-spacing:7px;color:#fff;opacity:.92;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,.4);}
  #title .how{margin-top:26px;max-width:340px;font-size:13px;line-height:1.8;color:#f0eaff;text-shadow:0 1px 6px rgba(0,0,0,.4);}
  #title .how b{color:#ffe39a;font-weight:800;}
  .tap{margin-top:30px;font-size:13px;letter-spacing:4px;opacity:.85;animation:blink 1.6s ease-in-out infinite;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,.5);}
  @keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
  #over{opacity:0;pointer-events:none;transition:opacity .5s;background:rgba(10,8,30,.5);backdrop-filter:blur(4px);}
  #over.show{opacity:1;pointer-events:auto;}
  #over .lbl{font-size:12px;letter-spacing:5px;opacity:.8;text-transform:uppercase;}
  #over .fs{font-size:clamp(56px,20vw,110px);font-weight:900;line-height:1;margin:6px 0 2px;font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#fff,#ffe39a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #over .nb{font-size:13px;letter-spacing:2px;color:#ffd27a;margin-top:8px;min-height:18px;}
  #over .stats{margin-top:14px;font-size:12px;opacity:.8;letter-spacing:1px;line-height:1.8;}
  #loader{position:absolute;left:0;right:0;bottom:38%;text-align:center;font-size:12px;letter-spacing:3px;opacity:.7;text-transform:uppercase;}
  .credit{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);font-size:9px;letter-spacing:1px;opacity:.5;z-index:6;text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .hidden{display:none!important;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <div id="score">0</div><div id="combo"></div><div id="best">BEST 0</div>
  <div id="pulseBtn">PULSE</div>
  <div id="pulseWrap"><div id="pulseBar"><div id="pulseFill"></div></div><div id="pulseLbl">Pulse — second finger / space</div></div>
</div>
<div class="panel" id="title">
  <h1>AURA</h1><div class="sub">Mirage Nights</div>
  <div class="how">Drag to <b>weave</b> your light.<br>Catch the <b>gems</b> — each one sings a note.<br>Dodge the <b>shards</b>. Charge the <b>pulse</b>.</div>
  <div class="tap" id="tapStart">loading…</div>
</div>
<div class="panel hidden" id="over">
  <div class="lbl">Run over</div><div class="fs" id="finalScore">0</div>
  <div class="lbl" id="bestLine">best 0</div><div class="nb" id="newbest"></div>
  <div class="stats" id="overStats"></div><div class="tap" style="margin-top:24px">tap to weave again</div>
</div>
<div class="credit">AURA · art &amp; sound: Kenney (CC0) · Mirage City universe</div>
<audio id="silent" loop playsinline preload="auto" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="></audio>

<script>
"use strict";
(function(){
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight; cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();
const rnd=(a=1,b)=> b===undefined? Math.random()*a : a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, hyp=(x,y)=>Math.sqrt(x*x+y*y);

/* ---------------- assets ---------------- */
const GEMS=[ {f:'gem-amethyst',rgb:[160,96,240]},{f:'gem-sapphire',rgb:[255,96,200]},{f:'gem-aqua',rgb:[255,86,72]},
  {f:'gem-emerald',rgb:[226,228,86]},{f:'gem-gold',rgb:[96,220,120]},{f:'gem-rose',rgb:[96,210,240]},{f:'gem-ruby',rgb:[96,134,240]} ];
const IMG={}; let imgReady=0, imgTotal=GEMS.length+2;
function loadImg(key,src){ const im=new Image(); im.onload=()=>{imgReady++;}; im.onerror=()=>{imgReady++;}; im.src=src; IMG[key]=im; }
loadImg('bg','assets/bg.png'); loadImg('spark','assets/sparkle.png');
GEMS.forEach((g,i)=>loadImg('g'+i,'assets/'+g.f+'.png'));
function imgOk(im){ return im && im.complete && im.naturalWidth>0; }

/* ---------------- audio (samples + procedural, robust unlock) ---------------- */
let actx=null, master=null, padGain=null, padFilter=null;
const sndRaw={}, sbuf={}, SND={match:'assets/tile-match.ogg',swap:'assets/tile-swap.ogg',land:'assets/tile-land.ogg'};
for(const k in SND){ fetch(SND[k]).then(r=>r.arrayBuffer()).then(b=>sndRaw[k]=b).catch(()=>{}); }
const SCALE=(()=>{const off=[0,3,5,7,10],a=[];for(let o=0;o<3;o++)for(const s of off)a.push(220*Math.pow(2,(o*12+s)/12));return a;})();
function unlockAudio(){
  try{
    if(!actx){ const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return; actx=new AC();
      master=actx.createGain(); master.gain.value=0.85; master.connect(actx.destination);
      const b=actx.createBuffer(1,1,22050),s=actx.createBufferSource(); s.buffer=b; s.connect(actx.destination); s.start(0);
      for(const k in sndRaw){ try{ actx.decodeAudioData(sndRaw[k].slice(0), buf=>{sbuf[k]=buf;}, ()=>{}); }catch(e){} }
      // ambient pad
      const p1=actx.createOscillator(),p2=actx.createOscillator(); p1.type='sawtooth'; p2.type='sawtooth'; p2.detune.value=9;
      p1.frequency.value=110; p2.frequency.value=110; padFilter=actx.createBiquadFilter(); padFilter.type='lowpass'; padFilter.frequency.value=420; padFilter.Q.value=5;
      padGain=actx.createGain(); padGain.gain.value=0; p1.connect(padFilter); p2.connect(padFilter); padFilter.connect(padGain); padGain.connect(master); p1.start(); p2.start();
    }
    if(actx.state==='suspended') actx.resume();
    const el=document.getElementById('silent'); if(el){ el.volume=0; el.play().catch(()=>{}); }
  }catch(e){}
}
function play(k,vol,rate){ if(!actx||!sbuf[k])return; try{ const s=actx.createBufferSource(); s.buffer=sbuf[k]; s.playbackRate.value=rate||1;
  const g=actx.createGain(); g.gain.value=vol==null?1:vol; s.connect(g); g.connect(master); s.start(0);}catch(e){} }
function note(i,vol){ if(!actx)return; try{ const f=SCALE[clamp(i,0,SCALE.length-1)]; const o=actx.createOscillator(),g=actx.createGain();
  o.type='triangle'; o.frequency.value=f; const t=actx.currentTime; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16*(vol||1),t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+0.45);}catch(e){} }
function tone(type,f0,f1,dur,vol){ if(!actx)return; try{ const o=actx.createOscillator(),g=actx.createGain(); o.type=type; const t=actx.currentTime;
  o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f1,t+dur); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.05);}catch(e){} }
function setPad(x){ if(!padGain||!actx)return; padGain.gain.setTargetAtTime(0.012+0.05*x,actx.currentTime,0.4); padFilter.frequency.setTargetAtTime(420+x*1500,actx.currentTime,0.5); }

/* ---------------- state ---------------- */
const HS_KEY='aura_best'; let best=0; try{ best=parseInt(localStorage.getItem(HS_KEY)||'0',10)||0; }catch(e){}
let state='title', t=0, timeScale=1, shake=0, flash=0, flashCol='255,255,255', nightK=0;
let score=0, displayScore=0, combo=0, comboTimer=0, mult=1, pulse=0, runTime=0, motesGot=0, bestMult=1;
const player={x:0,y:0,tx:0,ty:0,r:15,trail:[],shield:3,maxShield:3,invuln:0,alive:false,corePulse:0,spin:0};
const motes=[], hazards=[], parts=[], floats=[], shocks=[];
let spawnMote=0, spawnHaz=0, grace=0;

function resetRun(){ score=displayScore=0; combo=0; comboTimer=0; mult=1; pulse=0; runTime=0; motesGot=0; bestMult=1; nightK=0;
  player.x=player.tx=W/2; player.y=player.ty=H*0.62; player.trail.length=0; player.shield=player.maxShield=3; player.invuln=0; player.alive=true; player.corePulse=0;
  motes.length=hazards.length=parts.length=floats.length=shocks.length=0; spawnMote=0; spawnHaz=0; grace=5.5; timeScale=1; shake=0; flash=0;
  for(let i=0;i<7;i++) addMote(); }
function startGame(){ unlockAudio(); resetRun(); state='play'; document.getElementById('title').classList.add('hidden'); document.getElementById('over').classList.remove('show'); }

function addMote(){ let x=rnd(46,W-46), y=rnd(74,H-96);
  if(state==='play'&&hyp(x-player.x,y-player.y)<130){ x=clamp(x+(x<player.x?-1:1)*170,34,W-34); }
  motes.push({x,y,vx:rnd(-14,14),vy:rnd(-14,14),r:16,gi:Math.floor(rnd(GEMS.length)),born:0,pop:0,rot:rnd(6.28)}); }
function addHazard(){ const side=Math.floor(rnd(4)); let x,y; const sp=rnd(52,84)+runTime*1.5;
  if(side===0){x=-30;y=rnd(0,H);}else if(side===1){x=W+30;y=rnd(0,H);}else if(side===2){x=rnd(0,W);y=-30;}else{x=rnd(0,W);y=H+30;}
  const ang=Math.atan2(H*0.55-y,W*0.5-x)+rnd(-0.6,0.6); hazards.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,r:rnd(17,26),rot:rnd(6.28),spin:rnd(-3,3),near:false}); }
function burst(x,y,col,n,spd,spark){ for(let i=0;i<n;i++){ const a=rnd(6.28),s=rnd(spd*0.3,spd); parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,max:rnd(0.4,0.9),r:rnd(2,4),col,spark:!!spark,rot:rnd(6.28)}); } }
function floatText(x,y,txt,col){ floats.push({x,y,txt,col,life:1,vy:-34}); }

/* ---------------- input ---------------- */
let moveId=null;
function setT(px,py){ player.tx=px; player.ty=py; }
function pStart(px,py,id,second){ if(state!=='play'){ startGame(); player.tx=px; player.ty=py; moveId=id; return; } if(second){ doPulse(); return; } moveId=id; setT(px,py); }
cv.addEventListener('touchstart',e=>{ for(const tt of e.changedTouches) pStart(tt.clientX,tt.clientY,tt.identifier, moveId!==null&&state==='play'); e.preventDefault(); },{passive:false});
cv.addEventListener('touchmove',e=>{ for(const tt of e.changedTouches) if(tt.identifier===moveId) setT(tt.clientX,tt.clientY); e.preventDefault(); },{passive:false});
cv.addEventListener('touchend',e=>{ for(const tt of e.changedTouches) if(tt.identifier===moveId) moveId=null; e.preventDefault(); },{passive:false});
cv.addEventListener('touchcancel',()=>{moveId=null;});
cv.addEventListener('mousedown',e=>{ if(state!=='play')startGame(); setT(e.clientX,e.clientY); });
cv.addEventListener('mousemove',e=>{ if(state==='play') setT(e.clientX,e.clientY); });
addEventListener('keydown',e=>{ if(e.key===' '){ if(state!=='play')startGame(); else doPulse(); e.preventDefault(); } });
document.getElementById('title').addEventListener('click',()=>{ if(state!=='play')startGame(); });
document.getElementById('over').addEventListener('click',()=>{ if(state==='dead')startGame(); });
const pulseBtn=document.getElementById('pulseBtn');
pulseBtn.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();if(state==='play')doPulse();},{passive:false});
pulseBtn.addEventListener('mousedown',e=>{e.stopPropagation();if(state==='play')doPulse();});
// global first-gesture unlock backup
['touchstart','mousedown','keydown'].forEach(ev=>addEventListener(ev,function once(){unlockAudio();removeEventListener(ev,once);},{passive:true}));

/* ---------------- actions ---------------- */
function collect(m){ combo++; comboTimer=2.6; mult=1+Math.floor(combo/5); bestMult=Math.max(bestMult,mult); motesGot++;
  const gain=10*mult; score+=gain; pulse=clamp(pulse+0.05,0,1);
  play('match',clamp(0.5+combo*0.02,0.5,1), clamp(0.85+combo*0.03,0.85,1.8)); note(combo-1,clamp(0.5+combo*0.02,0.5,1));
  const c=GEMS[m.gi].rgb; burst(m.x,m.y,`rgb(${c[0]},${c[1]},${c[2]})`,8,170,true); floatText(m.x,m.y-10,'+'+gain,`rgb(${c[0]},${c[1]},${c[2]})`); player.corePulse=1; }
function hitPlayer(){ if(player.invuln>0||!player.alive)return; player.shield--; combo=0; mult=1; comboTimer=0;
  play('land',1,0.9); tone('square',220,60,0.22,0.22); shake=Math.min(shake+16,26); flash=1; flashCol='255,90,90'; player.invuln=1.4; timeScale=0.25; burst(player.x,player.y,'#ff6b6b',20,260);
  if(player.shield<0) die(); }
function die(){ if(state!=='play')return; state='dead'; player.alive=false; play('land',1,0.6); tone('sawtooth',330,40,1.1,0.3);
  shake=30; flash=1; flashCol='255,255,255'; timeScale=0.18; burst(player.x,player.y,'#ffffff',54,420,true);
  const nb=score>best; if(nb){ best=Math.floor(score); try{localStorage.setItem(HS_KEY,best);}catch(e){} }
  document.getElementById('finalScore').textContent=Math.floor(score).toLocaleString();
  document.getElementById('bestLine').textContent='best '+best.toLocaleString();
  document.getElementById('newbest').textContent=nb?'✦ NEW BEST ✦':'';
  document.getElementById('overStats').innerHTML='gems '+motesGot+' &nbsp;·&nbsp; top combo x'+bestMult+' &nbsp;·&nbsp; '+Math.floor(runTime)+'s';
  setTimeout(()=>document.getElementById('over').classList.add('show'),650); }
function doPulse(){ if(pulse<1||!player.alive)return; pulse=0; play('swap',1,0.8); tone('sine',150,40,0.5,0.5);
  shake=Math.min(shake+14,24); flash=0.7; flashCol='255,210,122'; shocks.push({x:player.x,y:player.y,r:10,max:Math.max(W,H)*0.62,life:1});
  const R=Math.max(W,H)*0.62;
  for(let i=hazards.length-1;i>=0;i--){ const h=hazards[i]; if(hyp(h.x-player.x,h.y-player.y)<R){ burst(h.x,h.y,'#ffd27a',14,240,true); score+=25; floatText(h.x,h.y,'+25','#ffd27a'); hazards.splice(i,1);} }
  let np=0; for(let i=motes.length-1;i>=0;i--){ const m=motes[i]; if(hyp(m.x-player.x,m.y-player.y)<R){ collect(m); motes.splice(i,1); addMote(); if(++np>14)break; } } }

/* ---------------- update ---------------- */
function update(rdt){ t+=rdt;
  if(state==='title'){ if((spawnMote-=rdt)<=0){ spawnMote=0.7; if(motes.length<11) addMote(); } stepMotes(rdt); stepParts(rdt); return; }
  const dt=rdt*timeScale; timeScale=lerp(timeScale,1,clamp(rdt*4,0,1));
  if(state==='play'){ runTime+=dt; comboTimer-=dt; if(comboTimer<=0){ combo=0; mult=1; } grace-=dt;
    nightK=lerp(nightK, clamp(combo/26,0,1), clamp(dt*2,0,1));
    const diff=1+runTime/40+score/4000;
    if((spawnMote-=dt)<=0){ spawnMote=clamp(0.55-runTime*0.004,0.28,0.55); if(motes.length<11) addMote(); }
    if(grace<=0&&(spawnHaz-=dt)<=0){ spawnHaz=clamp(1.5-runTime*0.012,0.5,1.5)/diff; addHazard(); }
    setPad(clamp(combo/40,0,1));
    const follow=1-Math.pow(0.0009,dt); player.x=lerp(player.x,player.tx,follow); player.y=lerp(player.y,player.ty,follow);
    player.x=clamp(player.x,12,W-12); player.y=clamp(player.y,12,H-12);
    player.trail.unshift({x:player.x,y:player.y}); if(player.trail.length>26) player.trail.pop();
    player.invuln=Math.max(0,player.invuln-dt); player.corePulse=Math.max(0,player.corePulse-dt*3); player.spin+=dt*2;
    for(let i=motes.length-1;i>=0;i--){ const m=motes[i]; if(hyp(m.x-player.x,m.y-player.y)<player.r+m.r+2){ collect(m); motes.splice(i,1); addMote(); } }
    for(let i=hazards.length-1;i>=0;i--){ const h=hazards[i]; const d=hyp(h.x-player.x,h.y-player.y);
      if(d<player.r+h.r-3){ hitPlayer(); burst(h.x,h.y,'#ff6b6b',8,200); hazards.splice(i,1); continue; }
      if(!h.near&&d<player.r+h.r+22){ h.near=true; if(player.invuln<=0){ timeScale=Math.min(timeScale,0.4); score+=5; combo++; comboTimer=2.6; floatText(player.x,player.y-26,'NICE','#ffe39a'); note(combo+6,0.4);} } }
  } else nightK=lerp(nightK,0.5,clamp(dt,0,1));
  stepMotes(dt); stepHaz(dt); stepParts(dt); stepFloats(dt); stepShocks(dt);
  shake=Math.max(0,shake-rdt*40); flash=Math.max(0,flash-rdt*2.5); displayScore+=(score-displayScore)*clamp(rdt*8,0,1);
}
function stepMotes(dt){ for(const m of motes){ m.born+=dt; m.pop=Math.min(1,m.born*3); m.rot+=dt*0.6; m.x+=m.vx*dt; m.y+=m.vy*dt; m.vx*=0.99; m.vy*=0.99;
  if(m.x<22||m.x>W-22)m.vx*=-1; if(m.y<64||m.y>H-72)m.vy*=-1; m.x=clamp(m.x,22,W-22); m.y=clamp(m.y,64,H-72); } }
function stepHaz(dt){ for(let i=hazards.length-1;i>=0;i--){ const h=hazards[i]; h.x+=h.vx*dt; h.y+=h.vy*dt; h.rot+=h.spin*dt; if(h.x<-60||h.x>W+60||h.y<-60||h.y>H+60) hazards.splice(i,1); } }
function stepParts(dt){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.life-=dt/p.max; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.94; p.vy*=0.94; p.rot+=dt*4; if(p.life<=0)parts.splice(i,1); } }
function stepFloats(dt){ for(let i=floats.length-1;i>=0;i--){ const f=floats[i]; f.life-=dt*0.9; f.y+=f.vy*dt; if(f.life<=0)floats.splice(i,1); } }
function stepShocks(dt){ for(let i=shocks.length-1;i>=0;i--){ const s=shocks[i]; s.r=lerp(s.r,s.max,clamp(dt*3,0,1)); s.life-=dt*1.6; if(s.life<=0)shocks.splice(i,1); } }

/* ---------------- draw ---------------- */
function drawSprite(im,x,y,size,rot,alpha){ if(!imgOk(im))return false; ctx.save(); ctx.globalAlpha=alpha==null?1:alpha; ctx.translate(x,y); if(rot)ctx.rotate(rot); ctx.drawImage(im,-size/2,-size/2,size,size); ctx.restore(); return true; }
function draw(){
  ctx.save(); if(shake>0) ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
  // background (cover) + parallax
  if(imgOk(IMG.bg)){ const iw=IMG.bg.naturalWidth, ih=IMG.bg.naturalHeight, sc=Math.max((W+40)/iw,(H+40)/ih), dw=iw*sc, dh=ih*sc;
    const px=(state==='play'?-(player.x-W/2)*0.02:0), py=(state==='play'?-(player.y-H/2)*0.02:0);
    ctx.drawImage(IMG.bg,(W-dw)/2+px,(H-dh)/2+py,dw,dh); }
  else { const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#caa8e6'); g.addColorStop(1,'#7fa0e6'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  // dusk overlay deepens with combo
  ctx.fillStyle=`rgba(10,7,30,${0.2+0.5*nightK})`; ctx.fillRect(0,0,W,H);

  // shock rings
  ctx.globalCompositeOperation='lighter';
  for(const s of shocks){ ctx.strokeStyle=`rgba(255,210,122,${s.life*0.6})`; ctx.lineWidth=5*s.life+1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.2832); ctx.stroke(); }
  ctx.globalCompositeOperation='source-over';

  // motes (glow + gem sprite)
  for(const m of motes){ const c=GEMS[m.gi].rgb, sz=m.r*2*(0.5+0.5*m.pop)*(1+0.06*Math.sin(t*5+m.born*6));
    ctx.globalCompositeOperation='lighter'; const gg=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,sz*1.7);
    gg.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0.5)`); gg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(m.x,m.y,sz*1.7,0,6.2832); ctx.fill();
    ctx.globalCompositeOperation='source-over'; if(!drawSprite(IMG['g'+m.gi],m.x,m.y,sz*1.5,Math.sin(t+m.rot)*0.18)){ ctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`; ctx.beginPath(); ctx.arc(m.x,m.y,sz*0.6,0,6.2832); ctx.fill(); } }

  // hazards (procedural dark shard, red rim)
  for(const h of hazards){ ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(h.rot);
    ctx.beginPath(); for(let k=0;k<8;k++){ const a=k/8*6.2832, rr=h.r*(k%2?0.5:1); ctx[k?'lineTo':'moveTo'](Math.cos(a)*rr,Math.sin(a)*rr);} ctx.closePath();
    const gr=ctx.createRadialGradient(0,0,2,0,0,h.r); gr.addColorStop(0,'#3a1024'); gr.addColorStop(1,'#120410'); ctx.fillStyle=gr; ctx.fill();
    ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=12; ctx.strokeStyle='#ff586e'; ctx.lineWidth=2.4; ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,90,110,0.9)'; ctx.beginPath(); ctx.arc(0,0,h.r*0.18,0,6.2832); ctx.fill(); ctx.restore(); }

  // player + trail
  if(state!=='title'&&(player.alive||state==='dead')){
    ctx.globalCompositeOperation='lighter';
    for(let i=player.trail.length-1;i>0;i--){ const a=i/player.trail.length, tp=player.trail[i], w=player.r*1.5*(1-a);
      ctx.fillStyle=`rgba(255,225,160,${(1-a)*0.45})`; ctx.beginPath(); ctx.arc(tp.x,tp.y,Math.max(0.5,w),0,6.2832); ctx.fill(); }
    if(player.alive){ const cr=player.r*(1+0.25*player.corePulse+(player.invuln>0?0.18*Math.sin(t*40):0));
      const gg=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,cr*4); gg.addColorStop(0,'#ffffff'); gg.addColorStop(0.3,'#ffe39a'); gg.addColorStop(0.6,'rgba(255,160,210,0.5)'); gg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(player.x,player.y,cr*4,0,6.2832); ctx.fill();
      drawSprite(IMG.spark,player.x,player.y,cr*4.4,player.spin,0.9);
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(player.x,player.y,cr*0.7,0,6.2832); ctx.fill();
      ctx.globalCompositeOperation='source-over';
      for(let i=0;i<player.shield;i++){ ctx.strokeStyle=`rgba(255,225,170,${0.55-i*0.13})`; ctx.lineWidth=2.4; ctx.beginPath(); ctx.arc(player.x,player.y,cr+9+i*6,0,6.2832); ctx.stroke(); } }
    ctx.globalCompositeOperation='source-over';
  }
  // particles
  ctx.globalCompositeOperation='lighter';
  for(const p of parts){ if(p.spark&&imgOk(IMG.spark)){ drawSprite(IMG.spark,p.x,p.y,p.r*4*clamp(p.life+0.2,0,1),p.rot,clamp(p.life,0,1)); }
    else { ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*clamp(p.life+0.2,0,1),0,6.2832); ctx.fill(); ctx.globalAlpha=1; } }
  ctx.globalCompositeOperation='source-over';
  // floats
  for(const f of floats){ ctx.globalAlpha=clamp(f.life,0,1); ctx.fillStyle=f.col; ctx.font='900 17px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=4; ctx.fillText(f.txt,f.x,f.y); ctx.shadowBlur=0; } ctx.globalAlpha=1;
  ctx.restore();
  if(flash>0){ ctx.fillStyle=`rgba(${flashCol},${flash*0.5})`; ctx.fillRect(0,0,W,H); }
  const vg=ctx.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.32,W/2,H*0.5,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,`rgba(2,1,14,${0.4+0.25*nightK})`); ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

/* ---------------- HUD ---------------- */
const el={score:document.getElementById('score'),combo:document.getElementById('combo'),best:document.getElementById('best'),pf:document.getElementById('pulseFill'),pb:document.getElementById('pulseBtn')};
function hud(){ el.score.textContent=Math.floor(displayScore).toLocaleString(); el.best.textContent='BEST '+best.toLocaleString();
  if(combo>=5){ el.combo.style.opacity='1'; el.combo.textContent='x'+mult+'  ·  '+combo+' combo'; el.combo.style.color='#ffe39a'; } else el.combo.style.opacity='0';
  el.pf.style.width=(pulse*100)+'%'; el.pb.classList.toggle('ready',pulse>=1);
  const show=state==='play'; el.score.style.opacity=show?1:0; document.getElementById('pulseWrap').style.opacity=show?1:0; el.pb.style.display=show?'flex':'none'; el.best.style.opacity=show?0.7:0; }

/* ---------------- loop + boot ---------------- */
let last=performance.now();
function loop(now){ let rdt=(now-last)/1000; last=now; if(rdt>0.05)rdt=0.05; update(rdt); draw(); hud(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
for(let i=0;i<8;i++) addMote();
// enable start once assets (mostly) ready
const tapEl=document.getElementById('tapStart');
const waitAssets=setInterval(()=>{ if(imgReady>=imgTotal){ clearInterval(waitAssets); tapEl.textContent='touch to begin'; } },120);
setTimeout(()=>{ if(tapEl.textContent==='loading…') tapEl.textContent='touch to begin'; },2500);
window.__AURA={get state(){return state;},get score(){return score;},get combo(){return combo;},get shield(){return player.shield;},get pulse(){return pulse;},set pulse(v){pulse=v;},player,motes,hazards,startGame,doPulse,get audioReady(){return !!actx;}};
})();
</script>
