<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a1a" />
<title>AURA — Mirage Nights</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none;}
  html,body{height:100%;background:#05030f;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:#fff;}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;}

  .hud{position:absolute;inset:0;pointer-events:none;z-index:5;}
  #score{position:absolute;top:max(14px,env(safe-area-inset-top));left:0;right:0;text-align:center;
    font-weight:800;font-size:clamp(34px,11vw,58px);letter-spacing:1px;font-variant-numeric:tabular-nums;
    text-shadow:0 2px 30px rgba(120,200,255,.5);line-height:1;}
  #combo{position:absolute;top:calc(max(14px,env(safe-area-inset-top)) + clamp(40px,13vw,66px));left:0;right:0;text-align:center;
    font-weight:800;font-size:16px;letter-spacing:3px;opacity:0;transition:opacity .2s;}
  #best{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;font-size:11px;letter-spacing:1px;opacity:.6;font-variant-numeric:tabular-nums;}
  #pulseWrap{position:absolute;left:50%;bottom:max(26px,calc(env(safe-area-inset-bottom) + 18px));transform:translateX(-50%);
    width:min(260px,62%);}
  #pulseBar{height:7px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden;}
  #pulseFill{height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,#36e3ff,#9b8cff,#ff6fb0);transition:width .08s;}
  #pulseLbl{text-align:center;font-size:10px;letter-spacing:3px;opacity:.55;margin-top:6px;text-transform:uppercase;}
  #pulseBtn{position:absolute;right:max(20px,env(safe-area-inset-right));bottom:max(80px,calc(env(safe-area-inset-bottom) + 70px));
    pointer-events:auto;width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:12px;letter-spacing:1px;border:1px solid rgba(155,140,255,.5);background:rgba(20,16,40,.4);
    backdrop-filter:blur(8px);box-shadow:0 0 26px rgba(155,140,255,.25);transition:transform .07s,box-shadow .2s,opacity .2s;opacity:.45;}
  #pulseBtn.ready{opacity:1;box-shadow:0 0 34px rgba(155,140,255,.6);}
  #pulseBtn:active{transform:scale(.9);}

  .panel{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;}
  #title h1{font-size:clamp(64px,26vw,150px);font-weight:900;letter-spacing:6px;line-height:.9;
    background:linear-gradient(180deg,#fff 8%,#9be9ff 42%,#9b8cff 78%,#ff6fb0);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 70px rgba(120,180,255,.4);}
  #title .sub{margin-top:6px;font-size:clamp(12px,4vw,16px);letter-spacing:7px;color:#cdd3ff;opacity:.85;text-transform:uppercase;}
  #title .how{margin-top:26px;max-width:340px;font-size:13px;line-height:1.7;color:#aeb6e0;}
  #title .how b{color:#9be9ff;font-weight:700;}
  .tap{margin-top:30px;font-size:13px;letter-spacing:4px;opacity:.8;animation:blink 1.6s ease-in-out infinite;text-transform:uppercase;}
  @keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
  #over{opacity:0;pointer-events:none;transition:opacity .5s;background:rgba(5,3,15,.45);backdrop-filter:blur(3px);}
  #over.show{opacity:1;pointer-events:auto;}
  #over .lbl{font-size:12px;letter-spacing:5px;opacity:.7;text-transform:uppercase;}
  #over .fs{font-size:clamp(56px,20vw,110px);font-weight:900;line-height:1;margin:6px 0 2px;font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#fff,#9be9ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #over .nb{font-size:13px;letter-spacing:2px;color:#ffd27a;margin-top:8px;min-height:18px;}
  #over .stats{margin-top:14px;font-size:12px;opacity:.7;letter-spacing:1px;line-height:1.8;}
  .credit{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);font-size:9px;letter-spacing:2px;opacity:.35;z-index:6;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud">
  <div id="score">0</div>
  <div id="combo"></div>
  <div id="best">BEST 0</div>
  <div id="pulseBtn">PULSE</div>
  <div id="pulseWrap"><div id="pulseBar"><div id="pulseFill"></div></div><div id="pulseLbl">Pulse — second finger / space</div></div>
</div>

<div class="panel" id="title">
  <h1>AURA</h1>
  <div class="sub">Mirage Nights</div>
  <div class="how">Drag to <b>weave</b> your light through the night.<br>Catch the <b>motes</b> — each one sings a note.<br>Dodge the <b>shards</b>. Charge the <b>pulse</b>.</div>
  <div class="tap">touch to begin</div>
</div>

<div class="panel hidden" id="over">
  <div class="lbl">Run over</div>
  <div class="fs" id="finalScore">0</div>
  <div class="lbl" id="bestLine">best 0</div>
  <div class="nb" id="newbest"></div>
  <div class="stats" id="overStats"></div>
  <div class="tap" style="margin-top:24px">tap to weave again</div>
</div>

<div class="credit">AURA · part of the MIRAGE CITY universe</div>

<script>
"use strict";
/* =====================================================================
   AURA — Mirage Nights
   A one-thumb light-weaving arcade. Pure canvas + WebAudio, no deps.
   Catch motes (each plays a note), dodge shards, charge the pulse.
   ===================================================================== */
(function(){
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

const rnd=(a=1,b)=> b===undefined? Math.random()*a : a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const hyp=(x,y)=>Math.sqrt(x*x+y*y);
function hx(c){c=c.replace('#','');return[parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];}
function mixC(a,b,t){const A=hx(a),B=hx(b);return`rgb(${A[0]+(B[0]-A[0])*t|0},${A[1]+(B[1]-A[1])*t|0},${A[2]+(B[2]-A[2])*t|0})`;}

/* ---------------- audio (lazy, on first gesture) ---------------- */
const Audio={ac:null,master:null,wet:null,pad:null,
  init(){ if(this.ac)return; try{ const AC=window.AudioContext||window.webkitAudioContext; this.ac=new AC(); }catch(e){return;}
    const ac=this.ac; this.master=ac.createGain(); this.master.gain.value=0.5; this.master.connect(ac.destination);
    // sparkle delay
    const d=ac.createDelay(); d.delayTime.value=0.19; const fb=ac.createGain(); fb.gain.value=0.32;
    this.wet=ac.createGain(); this.wet.gain.value=0.35; d.connect(fb); fb.connect(d); d.connect(this.wet); this.wet.connect(this.master); this.delay=d;
    // ambient pad
    const p1=ac.createOscillator(),p2=ac.createOscillator(); p1.type='sawtooth'; p2.type='sawtooth'; p2.detune.value=8;
    p1.frequency.value=110; p2.frequency.value=110; const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420; lp.Q.value=6;
    const pg=ac.createGain(); pg.gain.value=0.0; p1.connect(lp); p2.connect(lp); lp.connect(pg); pg.connect(this.master);
    p1.start(); p2.start(); this.pad=pg; this.padFilter=lp; this.padOscs=[p1,p2];
  },
  resume(){ if(this.ac&&this.ac.state==='suspended') this.ac.resume(); },
  note(i,gainMul){ const ac=this.ac; if(!ac)return; const f=SCALE[clamp(i,0,SCALE.length-1)];
    const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle'; o.frequency.value=f;
    const t=ac.currentTime; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.22*(gainMul||1),t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.connect(g); g.connect(this.master); g.connect(this.delay); o.start(t); o.stop(t+0.5); },
  boom(){ const ac=this.ac; if(!ac)return; const t=ac.currentTime;
    const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(38,t+0.5);
    g.gain.setValueAtTime(0.6,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.6); o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.65);
    this.noise(0.25,1200,t); },
  hit(){ const ac=this.ac; if(!ac)return; const t=ac.currentTime; this.noise(0.18,800,t);
    const o=ac.createOscillator(),g=ac.createGain(); o.type='square'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(60,t+0.2);
    g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25); o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.3); },
  death(){ const ac=this.ac; if(!ac)return; const t=ac.currentTime;
    const o=ac.createOscillator(),g=ac.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(330,t); o.frequency.exponentialRampToValueAtTime(40,t+1.1);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.2); o.connect(g); g.connect(this.master); o.start(t); o.stop(t+1.25); },
  noise(dur,freq,t){ const ac=this.ac; const n=Math.floor(ac.sampleRate*dur); const buf=ac.createBuffer(1,n,ac.sampleRate); const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n); const s=ac.createBufferSource(); s.buffer=buf;
    const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=1.2; const g=ac.createGain(); g.gain.value=0.5;
    s.connect(bp); bp.connect(g); g.connect(this.master); s.start(t); },
  setIntensity(x){ if(!this.pad)return; const ac=this.ac; this.pad.gain.setTargetAtTime(0.015+0.05*x,ac.currentTime,0.4);
    this.padFilter.frequency.setTargetAtTime(420+x*1400,ac.currentTime,0.5); }
};
// A-minor pentatonic across 3 octaves
const SCALE=(()=>{const off=[0,3,5,7,10],a=[];for(let o=0;o<3;o++)for(const s of off)a.push(220*Math.pow(2,(o*12+s)/12));return a;})();

/* ---------------- palettes (evolve with score) ---------------- */
const PAL=[
  {a:'#160f38',b:'#3a1d6e',acc:'#7ce8ff'},
  {a:'#06243a',b:'#0a4a55',acc:'#5cffc8'},
  {a:'#2a0f3a',b:'#6e1d52',acc:'#ff8cd0'},
  {a:'#321a0e',b:'#6e4520',acc:'#ffd27a'},
  {a:'#0e1638',b:'#23357a',acc:'#9bb4ff'}
];
function palAt(p){ const n=PAL.length; const i=Math.floor(p)%n, j=(i+1)%n, t=p-Math.floor(p);
  return { a:mixC(PAL[i].a,PAL[j].a,t), b:mixC(PAL[i].b,PAL[j].b,t), acc:mixC(PAL[i].acc,PAL[j].acc,t),
           accRGB:hx(PAL[i].acc).map((v,k)=>v+(hx(PAL[j].acc)[k]-v)*t) }; }

/* ---------------- skyline silhouette (Dubai soul) ---------------- */
let skyline=[];
function buildSkyline(){ skyline=[]; let x=-40; while(x<W+60){ const w=rnd(24,60); const h=rnd(30,120); skyline.push({x,w,h,spire:Math.random()<0.12}); x+=w+rnd(4,16);} }
buildSkyline(); addEventListener('resize',buildSkyline);

/* ---------------- starfield ---------------- */
const stars=[]; for(let i=0;i<90;i++) stars.push({x:rnd(1),y:rnd(1),z:rnd(0.2,1),tw:rnd(6.28)});

/* ---------------- state ---------------- */
const HS_KEY='aura_best';
let best=0; try{ best=parseInt(localStorage.getItem(HS_KEY)||'0',10)||0; }catch(e){}
let state='title', t=0, timeScale=1, shake=0, flash=0, flashCol='255,255,255';
let score=0, displayScore=0, combo=0, comboTimer=0, mult=1, pulse=0, runTime=0, motesGot=0, bestMult=1;
const player={x:0,y:0,tx:0,ty:0,r:12,trail:[],shield:3,maxShield:3,invuln:0,alive:false,pulsePop:0,corePulse:0};
const motes=[], hazards=[], parts=[], floats=[], shocks=[];
let spawnMote=0, spawnHaz=0, grace=0;

function resetRun(){
  score=0; displayScore=0; combo=0; comboTimer=0; mult=1; pulse=0; runTime=0; motesGot=0; bestMult=1;
  player.x=player.tx=W/2; player.y=player.ty=H*0.62; player.trail.length=0; player.shield=player.maxShield=3;
  player.invuln=0; player.alive=true; player.pulsePop=0;
  motes.length=hazards.length=parts.length=floats.length=shocks.length=0;
  spawnMote=0; spawnHaz=0; grace=5.5; timeScale=1; shake=0; flash=0;
  for(let i=0;i<7;i++) addMote();
}
function startGame(){ Audio.init(); Audio.resume(); resetRun(); state='play';
  document.getElementById('title').classList.add('hidden'); document.getElementById('over').classList.remove('show'); }

/* ---------------- entities ---------------- */
function addMote(){ const edge=Math.random(); let x,y;
  // spawn around the field, biased to ahead of player
  x=rnd(40,W-40); y=rnd(70,H-90);
  if(state==='play'){ // keep some distance from player so it's catchable, not instant
    if(hyp(x-player.x,y-player.y)<120){ x=clamp(x+ (x<player.x?-1:1)*160,30,W-30); } }
  motes.push({x,y,vx:rnd(-14,14),vy:rnd(-14,14),r:rnd(6,8),hue:rnd(6.28),born:0,pop:0}); }
function addHazard(){ const side=Math.floor(rnd(4)); let x,y,vx,vy; const sp=rnd(50,80)+runTime*1.4;
  if(side===0){x=-30;y=rnd(0,H);} else if(side===1){x=W+30;y=rnd(0,H);} else if(side===2){x=rnd(0,W);y=-30;} else {x=rnd(0,W);y=H+30;}
  const ang=Math.atan2(H*0.55-y,W*0.5-x)+rnd(-0.6,0.6); vx=Math.cos(ang)*sp; vy=Math.sin(ang)*sp;
  hazards.push({x,y,vx,vy,r:rnd(15,26),rot:rnd(6.28),spin:rnd(-2,2),near:false}); }

function burst(x,y,col,n,spd){ for(let i=0;i<n;i++){ const a=rnd(6.28),s=rnd(spd*0.3,spd); parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,max:rnd(0.4,0.9),r:rnd(1.5,3.5),col}); } }
function floatText(x,y,txt,col){ floats.push({x,y,txt,col,life:1,vy:-32}); }

/* ---------------- input ---------------- */
let moveId=null;
function setTarget(px,py){ player.tx=px; player.ty=py; }
function pointerStart(px,py,id,isSecond){
  if(state!=='play'){ startGame(); player.tx=px; player.ty=py; moveId=id; return; }
  if(isSecond){ doPulse(); return; }
  moveId=id; setTarget(px,py);
}
cv.addEventListener('touchstart',e=>{ for(let i=0;i<e.changedTouches.length;i++){ const tt=e.changedTouches[i];
    pointerStart(tt.clientX,tt.clientY,tt.identifier, moveId!==null && state==='play'); } e.preventDefault(); },{passive:false});
cv.addEventListener('touchmove',e=>{ for(let i=0;i<e.changedTouches.length;i++){ const tt=e.changedTouches[i]; if(tt.identifier===moveId) setTarget(tt.clientX,tt.clientY); } e.preventDefault(); },{passive:false});
cv.addEventListener('touchend',e=>{ for(let i=0;i<e.changedTouches.length;i++){ if(e.changedTouches[i].identifier===moveId) moveId=null; } e.preventDefault(); },{passive:false});
cv.addEventListener('touchcancel',e=>{ moveId=null; },{passive:false});
// mouse / desktop
let mdown=false;
cv.addEventListener('mousedown',e=>{ if(state!=='play'){ startGame(); } mdown=true; setTarget(e.clientX,e.clientY); });
cv.addEventListener('mousemove',e=>{ if(state==='play'&&(mdown||true)) setTarget(e.clientX,e.clientY); });
addEventListener('mouseup',()=>mdown=false);
addEventListener('keydown',e=>{ if(e.key===' '){ if(state!=='play') startGame(); else doPulse(); e.preventDefault(); } });
// overlay taps to (re)start
document.getElementById('title').addEventListener('click',()=>{ if(state!=='play') startGame(); });
document.getElementById('over').addEventListener('click',()=>{ if(state==='dead') startGame(); });
const pulseBtn=document.getElementById('pulseBtn');
pulseBtn.addEventListener('touchstart',e=>{ e.stopPropagation(); e.preventDefault(); if(state==='play')doPulse(); },{passive:false});
pulseBtn.addEventListener('mousedown',e=>{ e.stopPropagation(); if(state==='play')doPulse(); });

/* ---------------- core actions ---------------- */
function collect(m){ combo++; comboTimer=2.6; mult=1+Math.floor(combo/5); bestMult=Math.max(bestMult,mult); motesGot++;
  const gain=10*mult; score+=gain; pulse=clamp(pulse+0.05,0,1);
  Audio.note(combo-1, clamp(0.6+combo*0.02,0.6,1));
  const col=`hsl(${(m.hue*57+t*40)%360},100%,70%)`;
  burst(m.x,m.y,col,10,180); floatText(m.x,m.y-8,'+'+gain, col);
  player.corePulse=1;
}
function hitPlayer(){ if(player.invuln>0||!player.alive)return; player.shield--; combo=0; mult=1; comboTimer=0;
  Audio.hit(); shake=Math.min(shake+16,26); flash=1; flashCol='255,90,90'; player.invuln=1.4; timeScale=0.25; setTimeout(()=>{},0);
  burst(player.x,player.y,'#ff6b6b',22,260);
  if(player.shield<0) die();
}
function die(){ if(state!=='play')return; state='dead'; player.alive=false; Audio.death();
  shake=30; flash=1; flashCol='255,255,255'; timeScale=0.18;
  burst(player.x,player.y,'#ffffff',60,420); burst(player.x,player.y, pal().acc,40,300);
  const nb = score>best; if(nb){ best=Math.floor(score); try{localStorage.setItem(HS_KEY,best);}catch(e){} }
  document.getElementById('finalScore').textContent=Math.floor(score).toLocaleString();
  document.getElementById('bestLine').textContent='best '+best.toLocaleString();
  document.getElementById('newbest').textContent= nb?'✦ NEW BEST ✦':'';
  document.getElementById('overStats').innerHTML='motes '+motesGot+' &nbsp;·&nbsp; top combo x'+bestMult+' &nbsp;·&nbsp; '+Math.floor(runTime)+'s';
  setTimeout(()=>document.getElementById('over').classList.add('show'),650);
}
function doPulse(){ if(pulse<1||!player.alive)return; pulse=0; Audio.boom();
  shake=Math.min(shake+14,24); flash=0.7; flashCol='155,140,255'; player.pulsePop=1;
  shocks.push({x:player.x,y:player.y,r:10,max:Math.max(W,H)*0.6,life:1});
  const R=Math.max(W,H)*0.6;
  for(let i=hazards.length-1;i>=0;i--){ const h=hazards[i]; if(hyp(h.x-player.x,h.y-player.y)<R){
      burst(h.x,h.y,'#9b8cff',16,240); score+=25; floatText(h.x,h.y,'+25','#9b8cff'); hazards.splice(i,1); } }
  let np=0; for(let i=motes.length-1;i>=0;i--){ const m=motes[i]; if(hyp(m.x-player.x,m.y-player.y)<R){ collect(m); motes.splice(i,1); addMote(); np++; if(np>14)break; } }
}

/* ---------------- update ---------------- */
function pal(){ return palAt(score/1600); }
function update(rdt){
  t+=rdt;
  // twinkle stars regardless of state
  for(const s of stars) s.tw+=rdt*2;
  if(state==='title'){ // attract mode: drifting motes
    if((spawnMote-=rdt)<=0){ spawnMote=0.7; if(motes.length<10) addMote(); }
    stepMotes(rdt,true); stepParts(rdt); return;
  }
  const dt=rdt*timeScale;
  timeScale=lerp(timeScale, 1, clamp(rdt*4,0,1));
  if(state==='play'){
    runTime+=dt; comboTimer-=dt; if(comboTimer<=0){ combo=0; mult=1; }
    grace-=dt;
    // difficulty
    const diff=1+runTime/40+score/4000;
    if((spawnMote-=dt)<=0){ spawnMote=clamp(0.55-runTime*0.004,0.28,0.55); if(motes.length<10) addMote(); }
    if(grace<=0 && (spawnHaz-=dt)<=0){ spawnHaz=clamp(1.5-runTime*0.012,0.5,1.5)/diff; addHazard(); }
    Audio.setIntensity(clamp(combo/40,0,1));
    // move player toward target (smooth, snappy)
    const follow=1-Math.pow(0.0009,dt);
    player.x=lerp(player.x,player.tx,follow); player.y=lerp(player.y,player.ty,follow);
    player.x=clamp(player.x,10,W-10); player.y=clamp(player.y,10,H-10);
    // trail
    player.trail.unshift({x:player.x,y:player.y}); if(player.trail.length>26) player.trail.pop();
    player.invuln=Math.max(0,player.invuln-dt);
    player.corePulse=Math.max(0,player.corePulse-dt*3);
    player.pulsePop=Math.max(0,player.pulsePop-dt*2);
    // collect motes
    for(let i=motes.length-1;i>=0;i--){ const m=motes[i]; if(hyp(m.x-player.x,m.y-player.y)<player.r+m.r+4){ collect(m); motes.splice(i,1); addMote(); } }
    // hazards + near miss + hit
    for(let i=hazards.length-1;i>=0;i--){ const h=hazards[i]; const d=hyp(h.x-player.x,h.y-player.y);
      if(d<player.r+h.r-2){ hitPlayer(); burst(h.x,h.y,'#ff6b6b',10,200); hazards.splice(i,1); continue; }
      if(!h.near && d<player.r+h.r+22){ h.near=true; if(player.invuln<=0){ timeScale=Math.min(timeScale,0.4); score+=5; combo++; comboTimer=2.6; floatText(player.x,player.y-22,'NICE','#9be9ff'); Audio.note(combo+6,0.4); } }
    }
  }
  pulse=clamp(pulse - (state==='play'?0:0), 0,1);
  stepMotes(dt,false); stepHaz(dt); stepParts(dt); stepFloats(dt); stepShocks(dt);
  shake=Math.max(0,shake-rdt*40); flash=Math.max(0,flash-rdt*2.5);
  displayScore += (score-displayScore)*clamp(rdt*8,0,1);
}
function stepMotes(dt,attract){ for(const m of motes){ m.born+=dt; m.pop=Math.min(1,m.born*3);
  m.x+=m.vx*dt; m.y+=m.vy*dt; m.vx*=0.99; m.vy*=0.99;
  if(m.x<20||m.x>W-20) m.vx*=-1; if(m.y<60||m.y>H-70) m.vy*=-1; m.x=clamp(m.x,20,W-20); m.y=clamp(m.y,60,H-70); } }
function stepHaz(dt){ for(let i=hazards.length-1;i>=0;i--){ const h=hazards[i]; h.x+=h.vx*dt; h.y+=h.vy*dt; h.rot+=h.spin*dt;
  if(h.x<-60||h.x>W+60||h.y<-60||h.y>H+60) hazards.splice(i,1); } }
function stepParts(dt){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.life-=dt/p.max; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.94; p.vy*=0.94; if(p.life<=0) parts.splice(i,1); } }
function stepFloats(dt){ for(let i=floats.length-1;i>=0;i--){ const f=floats[i]; f.life-=dt*0.9; f.y+=f.vy*dt; if(f.life<=0) floats.splice(i,1); } }
function stepShocks(dt){ for(let i=shocks.length-1;i>=0;i--){ const s=shocks[i]; s.r=lerp(s.r,s.max,clamp(dt*3,0,1)); s.life-=dt*1.6; if(s.life<=0) shocks.splice(i,1); } }

/* ---------------- draw ---------------- */
function draw(){
  const P=pal();
  ctx.save();
  if(shake>0){ ctx.translate(rnd(-shake,shake),rnd(-shake,shake)); }
  // background gradient
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,P.a); g.addColorStop(1,P.b); ctx.fillStyle=g; ctx.fillRect(-40,-40,W+80,H+80);
  // glow behind player
  if(state!=='title'){ const rg=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,260);
    rg.addColorStop(0,`rgba(${P.accRGB.map(v=>v|0).join(',')},0.10)`); rg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=rg; ctx.fillRect(0,0,W,H); }
  // stars
  for(const s of stars){ const a=0.3+0.5*(0.5+0.5*Math.sin(s.tw)); ctx.fillStyle=`rgba(255,255,255,${a*s.z})`;
    const px=(s.x*W + (state==='play'?-player.x*0.02*s.z:0))%W; ctx.fillRect((px+W)%W, s.y*H*0.8, 1.6*s.z,1.6*s.z); }
  // skyline silhouette
  ctx.fillStyle=mixC(P.a,'#000000',0.35);
  for(const b of skyline){ const par=state==='play'?(player.x-W/2)*0.01:0; ctx.fillRect(b.x-par,H-b.h,b.w,b.h);
    if(b.spire){ ctx.fillRect(b.x-par+b.w/2-1,H-b.h-26,2,26); } }

  ctx.globalCompositeOperation='lighter';
  // shock rings
  for(const s of shocks){ ctx.strokeStyle=`rgba(155,140,255,${s.life*0.5})`; ctx.lineWidth=4*s.life+1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.2832); ctx.stroke(); }
  // motes
  for(const m of motes){ const col=`hsl(${(m.hue*57+t*40)%360},100%,68%)`; const rr=m.r*(0.6+0.4*m.pop)*(1+0.12*Math.sin(t*5+m.born*6));
    const gg=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,rr*3.4); gg.addColorStop(0,col); gg.addColorStop(0.4,col.replace(')',',0.5)').replace('hsl','hsla')); gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(m.x,m.y,rr*3.4,0,6.2832); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(m.x,m.y,rr*0.6,0,6.2832); ctx.fill(); }
  // particles
  for(const p of parts){ ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*clamp(p.life+0.2,0,1),0,6.2832); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';

  // hazards (dark crystalline shards with accent rim)
  for(const h of hazards){ ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(h.rot);
    ctx.beginPath(); for(let k=0;k<5;k++){ const a=k/5*6.2832; const rr=h.r*(k%2?0.6:1); ctx[k?'lineTo':'moveTo'](Math.cos(a)*rr,Math.sin(a)*rr);} ctx.closePath();
    ctx.fillStyle='#0a0612'; ctx.fill(); ctx.strokeStyle=P.acc; ctx.lineWidth=2; ctx.globalAlpha=0.9; ctx.stroke(); ctx.globalAlpha=1;
    ctx.fillStyle=`rgba(${P.accRGB.map(v=>v|0).join(',')},0.25)`; ctx.beginPath(); ctx.arc(0,0,h.r*0.4,0,6.2832); ctx.fill(); ctx.restore(); }

  // player
  if(state!=='title' && (player.alive || state==='dead')){
    ctx.globalCompositeOperation='lighter';
    // trail
    for(let i=player.trail.length-1;i>0;i--){ const a=i/player.trail.length; const tp=player.trail[i];
      const w=player.r*1.7*(1-a); ctx.fillStyle=`rgba(${P.accRGB.map(v=>v|0).join(',')},${(1-a)*0.5})`;
      ctx.beginPath(); ctx.arc(tp.x,tp.y,Math.max(0.5,w),0,6.2832); ctx.fill(); }
    if(player.alive){
      const cr=player.r*(1+0.25*player.corePulse+(player.invuln>0?0.15*Math.sin(t*40):0));
      const gg=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,cr*4);
      gg.addColorStop(0,'#ffffff'); gg.addColorStop(0.3,P.acc); gg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(player.x,player.y,cr*4,0,6.2832); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(player.x,player.y,cr*0.7,0,6.2832); ctx.fill();
      // shield rings
      ctx.globalCompositeOperation='source-over';
      for(let i=0;i<player.shield;i++){ ctx.strokeStyle=`rgba(${P.accRGB.map(v=>v|0).join(',')},${0.5-i*0.12})`; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(player.x,player.y,cr+8+i*6,0,6.2832); ctx.stroke(); }
    }
    ctx.globalCompositeOperation='source-over';
  }

  // floats
  for(const f of floats){ ctx.globalAlpha=clamp(f.life,0,1); ctx.fillStyle=f.col; ctx.font='800 16px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(f.txt,f.x,f.y); } ctx.globalAlpha=1;

  ctx.restore();
  // flash
  if(flash>0){ ctx.fillStyle=`rgba(${flashCol},${flash*0.5})`; ctx.fillRect(0,0,W,H); }
  // vignette
  const vg=ctx.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.3,W/2,H*0.5,Math.max(W,H)*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.5)'); ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

/* ---------------- HUD ---------------- */
const el={score:document.getElementById('score'),combo:document.getElementById('combo'),best:document.getElementById('best'),
  pf:document.getElementById('pulseFill'),pb:document.getElementById('pulseBtn')};
function hud(){
  el.score.textContent=Math.floor(displayScore).toLocaleString();
  el.best.textContent='BEST '+best.toLocaleString();
  if(combo>=5){ el.combo.style.opacity='1'; el.combo.textContent='x'+mult+'  ·  '+combo+' combo';
    el.combo.style.color=pal().acc; } else el.combo.style.opacity='0';
  el.pf.style.width=(pulse*100)+'%';
  if(pulse>=1) el.pb.classList.add('ready'); else el.pb.classList.remove('ready');
  const show = state==='play'; el.score.style.opacity=show?1:0; el.combo.style.display=show?'block':'none';
  document.getElementById('pulseWrap').style.opacity=show?1:0; el.pb.style.display=show?'flex':'none'; el.best.style.opacity=show?0.6:0;
}

/* ---------------- loop ---------------- */
let last=performance.now();
function loop(now){ let rdt=(now-last)/1000; last=now; if(rdt>0.05)rdt=0.05;
  update(rdt); draw(); hud(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

// title attract: seed a few motes
for(let i=0;i<8;i++) addMote();
window.__AURA={get state(){return state;},get score(){return score;},get combo(){return combo;},get shield(){return player.shield;},
  get pulse(){return pulse;},set pulse(v){pulse=v;},player,motes,hazards,startGame,doPulse};
})();
</script>
