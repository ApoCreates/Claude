    <text x="605" y="357" text-anchor="middle" font-size="9" fill="#5b6b7d">calendar · entity resolution</text>
    <text x="605" y="369" text-anchor="middle" font-size="9" fill="#5b6b7d">POS-to-GL reconciliation</text>

