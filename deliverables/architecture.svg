  <!-- ===== Governance band ===== -->
  <g>
    <rect x="36" y="470" width="1053" height="86" rx="10" fill="#14202e"/>
    <text x="60" y="497" font-size="13" font-weight="bold" fill="#ffffff">Governance, Security &amp; Compliance — by design, across every layer</text>
    <g font-size="10.5" fill="#dbe3ec">
      <text x="60"  y="524">• Entra ID (Azure AD) SSO</text>
      <text x="260" y="524">• Role &amp; row-level security</text>
      <text x="500" y="524">• UAE data residency (Azure UAE)</text>
      <text x="800" y="524">• PDPL / DIFC / ADGM aware</text>
      <text x="60"  y="545">• Encryption in transit &amp; at rest</text>
      <text x="320" y="545">• Full audit trail &amp; lineage</text>
      <text x="600" y="545">• Secrets vault, no creds in code</text>
      <text x="870" y="545">• Data minimization to AI</text>
    </g>
  </g>

  <!-- ===== Scalability band ===== -->
