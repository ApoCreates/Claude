    <rect x="36" y="568" width="1053" height="64" rx="10" fill="#f3f5f8" stroke="#d7dde5"/>
    <text x="60" y="592" font-size="12.5" font-weight="bold" fill="#14202e">Built to scale</text>
    <g font-size="10.5" fill="#41506a">
      <text x="60"  y="613">• Add a new source = add a connector, not a re-build</text>
      <text x="470" y="613">• Latency tuned per decision (real-time to daily)</text>
      <text x="850" y="613">• Sized for seasonal peaks</text>
      <text x="60"  y="628">• One KPI definition reused everywhere (no conflicting numbers)</text>
      <text x="560" y="628">• Cloud-elastic compute &amp; storage; pay for what you use</text>
    </g>
  </g>

  <!-- legend / flow note -->
  <g>
    <text x="36" y="664" font-size="11" font-weight="bold" fill="#14202e">Data flow</text>
    <text x="120" y="664" font-size="10.5" fill="#5b6b7d">Source systems remain the system of record. We read from them (never write back), reconcile POS to finance, classify revenue by source, and serve a single governed truth to the AI and the dashboard.</text>
  </g>

